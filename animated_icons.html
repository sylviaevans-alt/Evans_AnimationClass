<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" a href="animated_icons.css">
        <title>AnimatedIcons</title>
    </head>
    <body>
        
        <section class="animated_icons_container">
            <div class="animated_icon1">
                <div class="toggle_back">
                    <div class="toggle"></div>
                </div>
            </div>
            <div class="animated_icon2">
                <div class="square"></div>
            </div>
            <div class="animated_icon3">
                <div class="circle_glow">
                    <div class="circle"></div>
                </div>
            </div>
        </section>
    
    
    <!--Add a <section> element to the page and apply class="animated-icons-container"
In your CSS, give this class these properties: position: fixed;, inset: 0;, display: grid;,
grid-template-columns: repeat(3, 1fr);, and place-items: center; to it.

Add three <div> elements with class="animated-icon-[0]" (replacing [0] with 1, 2, and 3)
inside the <section> element. Style these three divs in any way you choose. If you'd like
you can add an SVG icon or text to these divs to delve deeper, but it's not required.

Using the @keyframes rule and the animation property, give each of these divs a unique animation.
Create at least three @keyframes rules in your CSS to apply to your divs.-->
    
    </body>
</html>
